<!DOCTYPE html>
<html>
<head>
<title>Electrician Connect Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d6efd,#00b4d8);
}

.container{
width:400px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0px 10px 30px rgba(0,0,0,0.25);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h2{
color:#0d6efd;
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#084298;
}

.register{
margin-top:20px;
}

.register a{
text-decoration:none;
color:#0d6efd;
font-weight:bold;
}

.footer{
margin-top:20px;
font-size:12px;
color:gray;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">⚡👨‍🔧</div>

<h2>Electrician Connect</h2>

<p class="subtitle">
Smart Electrical Service Management System
</p>

<form action="/login" method="POST">

<input type="email"
name="email"
placeholder="Enter Email Address"
required>

<input type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="register">
New User?
<a href="/register">Register Here</a>
</div>

<div class="footer">
DBMS Mini Project | Flask + MySQL
</div>

</div>

</body>
</html>
