<!DOCTYPE html>
<html>
<head>
<title>Book Electrician Service</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0d6efd,#00b4d8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:450px;
box-shadow:0px 5px 20px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:#0d6efd;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
background:#0d6efd;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#084298;
}

.back{
text-align:center;
margin-top:15px;
}

.back a{
text-decoration:none;
color:#0d6efd;
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ Book Electrician Service</h1>

<form method="POST">

<label>Your Name</label>
<input type="text"
name="user_name"
placeholder="Enter your name"
required>

<label>Electrician Name</label>
<input type="text"
name="electrician_name"
value="{{ electrician_name }}"
placeholder="Selected Electrician"
required>

<label>Service Type</label>

<select name="service_type" required>
<option value="">Select Service</option>
<option>Fan Installation</option>
<option>Switch Repair</option>
<option>House Wiring</option>
<option>MCB Replacement</option>
<option>Socket Installation</option>
<option>Power Failure Check</option>
<option>Electrical Maintenance</option>
</select>

<button type="submit">
Confirm Booking
</button>

</form>

<div class="back">
<a href="/dashboard">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
