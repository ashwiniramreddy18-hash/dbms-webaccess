<!DOCTYPE html>
<html>
<head>
<title>Electrician Connect Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:linear-gradient(135deg,#0d6efd,#00b4d8);
color:white;
text-align:center;
padding:30px;
}

.container{
width:90%;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0px 4px 15px rgba(0,0,0,0.15);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:55px;
margin-bottom:10px;
}

h2{
color:#333;
}

button{
padding:12px 25px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#084298;
}

a{
text-decoration:none;
}

.footer{
text-align:center;
padding:20px;
color:gray;
}

</style>

</head>

<body>

<div class="header">
<h1>⚡ Electrician Connect Dashboard</h1>
<p>Electrical Service Management System</p>
</div>

<div class="container">

<div class="card">
<div class="icon">👨‍🔧</div>
<h2>Find Electrician</h2>
<a href="/electricians">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">📅</div>
<h2>Book Service</h2>
<a href="/book">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">🛠️</div>
<h2>Tool Rental</h2>
<a href="/tools">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">🛒</div>
<h2>Product Store</h2>
<a href="/products">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">📦</div>
<h2>View Orders</h2>
<a href="/orders">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">🛍️</div>
<h2>Cart</h2>
<a href="/cart">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">🎥</div>
<h2>Tutorial Videos</h2>
<a href="/tutorials">
<button>Open</button>
</a>
</div>

<div class="card">
<div class="icon">🤖</div>
<h2>AI Assistant</h2>
<a href="/assistant">
<button>Open</button>
</a>
</div>

</div>

<div class="footer">
© 2026 Electrician Connect | DBMS Mini Project
</div>

</body>
</html>
