<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:linear-gradient(135deg,#0d6efd,#00b4d8);
color:white;
text-align:center;
padding:25px;
}

.container{
width:90%;
max-width:650px;
margin:40px auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0px 8px 25px rgba(0,0,0,0.15);
}

.product{
text-align:center;
padding:15px;
background:#f8f9fa;
border-radius:12px;
margin-bottom:25px;
}

.product h2{
color:#0d6efd;
margin-bottom:10px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

.payment-box{
background:#f8f9fa;
padding:15px;
border-radius:10px;
margin-top:15px;
}

button{
width:100%;
padding:14px;
margin-top:25px;
background:#28a745;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#218838;
}

.secure{
text-align:center;
margin-top:15px;
color:gray;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h1>🛒 Secure Checkout</h1>
<p>Electrician Connect Store</p>
</div>

<div class="container">

<div class="product">
<h2>{{ item }}</h2>
<p>Selected Product / Tool</p>
</div>

<form method="POST">

<label>👤 Customer Name</label>
<input type="text"
name="customer_name"
placeholder="Enter Full Name"
required>

<label>📞 Phone Number</label>
<input type="text"
name="phone"
placeholder="Enter Mobile Number"
required>

<label>🏠 Delivery Address</label>
<input type="text"
name="address"
placeholder="Enter Complete Address"
required>

<div class="payment-box">

<label>💳 Payment Method</label>

<select name="payment_method">

<option value="Cash on Delivery">
Cash on Delivery
</option>

<option value="UPI">
UPI Payment
</option>

<option value="Card">
Debit / Credit Card
</option>

</select>

</div>

<button type="submit">
✅ Confirm Order
</button>

</form>

<div class="secure">
🔒 Secure Order Processing
</div>

</div>

</body>
</html>
